version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: carebridge_db
    environment:
      POSTGRES_USER: carebridge
      POSTGRES_PASSWORD: carebridge_dev_pass
      POSTGRES_DB: carebridge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carebridge"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: carebridge_api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    restart: unless-stopped

volumes:
  pgdata:
